name: fitrack_dart_replay
description: >
  Offline replay harness — feeds extracted MediaPipe keypoints through the
  real RepCounter FSM and compares detected rep boundaries against manual
  annotations. Keeps the FSM as a single source of truth: no re-implementation
  of the state machine in Python.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.0

dependencies:
  fitrack:
    path: ../../../app

  flutter:
    sdk: flutter
