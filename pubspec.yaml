name: fitrack
description: "AI-based fitness benchmark app for pose estimation model comparison."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.12.0
  image_picker: ^1.1.2
  video_player: ^2.9.2
  google_mlkit_pose_detection: ^0.12.0
  tflite_flutter: ^0.11.0
  path_provider: ^2.1.5
  csv: ^6.0.0
  device_info_plus: ^12.3.0
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
